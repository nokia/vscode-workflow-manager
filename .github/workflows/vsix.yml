name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (semver, e.g. 4.2.0 or v4.2.0)"
        required: true
      prerelease:
        description: "Mark as pre-release?"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish VSIX
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Use a PAT so the version-bump commit can trigger downstream workflows
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── Version validation ──────────────────────────────────────────────────
      - name: Validate and normalise version
        id: version
        env:
          RELEASE_VERSION: ${{ github.event.inputs.version }}
        run: |
          VERSION="${RELEASE_VERSION#v}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid version '${RELEASE_VERSION}' — expected semver, e.g. 4.2.0 or v4.2.0." >&2
            exit 1
          fi
          echo "version=${VERSION}"   >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}"      >> "$GITHUB_OUTPUT"

      # ── Bump package.json ───────────────────────────────────────────────────
      - name: Update package.json version
        run: |
          npm version ${{ steps.version.outputs.version }} --no-git-tag-version
          echo "Updated package.json to ${{ steps.version.outputs.version }}"

      - name: Commit and push version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: release ${{ steps.version.outputs.version }}"
          git push

      # ── Tag ─────────────────────────────────────────────────────────────────
      - name: Create and push release tag
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      # ── Build ────────────────────────────────────────────────────────────────
      # `vsce package` automatically runs the `vscode:prepublish` lifecycle
      # script (esbuild --minify), so no separate build step is needed.
      - name: Package extension (VSIX)
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          PACKAGE_FILE="${PACKAGE_NAME}-${PACKAGE_VERSION}.vsix"
          npx vsce package --out "$PACKAGE_FILE"
          echo "PACKAGE_NAME=${PACKAGE_NAME}"   >> "$GITHUB_ENV"
          echo "PACKAGE_FILE=${PACKAGE_FILE}"   >> "$GITHUB_ENV"
          # Keep a "latest" copy with a stable filename for easy consumption
          LATEST_FILE="${PACKAGE_NAME}.vsix"
          cp "$PACKAGE_FILE" "$LATEST_FILE"
          echo "LATEST_FILE=${LATEST_FILE}"     >> "$GITHUB_ENV"

      # ── GitHub Release ───────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Release ${{ steps.version.outputs.version }}"
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          generate_release_notes: true
          files: |
            ${{ env.PACKAGE_FILE }}
            ${{ env.LATEST_FILE }}

      # ── VS Marketplace publish ───────────────────────────────────────────────
      - name: Publish to VS Marketplace
        id: publish
        continue-on-error: true
        env:
          VSCE_TOKEN: ${{ secrets.VSCE_TOKEN }}
        run: |
          if [ -z "$VSCE_TOKEN" ]; then
            echo "::warning::VSCE_TOKEN secret is not set — skipping Marketplace publish."
            exit 0
          fi
          npx vsce publish --packagePath "$PACKAGE_FILE" --pat "$VSCE_TOKEN"

      - name: Warn if Marketplace publish failed
        if: always() && steps.publish.outcome == 'failure'
        run: |
          echo "::warning::Marketplace publish failed (token missing, expired, or insufficient permissions). The VSIX is still attached to the GitHub release."

      # ── Artifact ─────────────────────────────────────────────────────────────
      - name: Upload workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nokia-wfm-vsix
          path: |
            ${{ env.PACKAGE_FILE }}
            ${{ env.LATEST_FILE }}
